<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>exp6_b - Fancy Validation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#7f5ad4);
overflow:hidden;
}

/* Floating bubbles */

body::before, body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,0.2);
border-radius:50%;
animation:float 6s infinite ease-in-out alternate;
}

body::after{
top:70%;
left:70%;
animation-delay:2s;
}

@keyframes float{
from{transform:translateY(0px);}
to{transform:translateY(-40px);}
}

/* Glass Card */

.container{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
color:white;
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

h2{
margin-bottom:10px;
font-weight:700;
}

p{
font-size:14px;
opacity:0.9;
margin-bottom:20px;
}

/* Inputs */

.input-group{
position:relative;
margin:15px 0;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
font-size:14px;
}

input:focus{
box-shadow:0 0 12px #ffb6c1;
}

/* Toggle icon */

.toggle{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
color:#ff4d88;
font-size:14px;
}

/* Button */

button{
margin-top:20px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff4d88,#ff8fab);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.07);
box-shadow:0 0 15px #ff8fab;
}

/* Messages */

.error{
color:#ffe0e6;
font-size:13px;
text-align:left;
margin-top:4px;
}

.success{
margin-top:15px;
color:#00ffcc;
font-weight:bold;
animation:pop 0.6s ease;
}

@keyframes pop{
from{transform:scale(0);}
to{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">

<h2>Experiment exp6_b</h2>
<p>Client-Side Form Validation</p>

<form onsubmit="return validateForm()">

<div class="input-group">
<input type="text" id="email" placeholder="Enter Email ID">
<div class="error" id="emailError"></div>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Enter Password">
<span class="toggle" onclick="togglePassword()">👁️</span>
<div class="error" id="passError"></div>
</div>

<button type="submit">Submit</button>

<div class="success" id="successMsg"></div>

</form>

</div>

<script>

function togglePassword(){
let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}
}


function validateForm(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let emailError=document.getElementById("emailError");
let passError=document.getElementById("passError");
let successMsg=document.getElementById("successMsg");

emailError.innerHTML="";
passError.innerHTML="";
successMsg.innerHTML="";

let valid=true;


/* Email Validation */

let emailPattern=/^[^\s@]+@[^\s@]+\.(com|in|[a-z]{2,})$/;

if(!emailPattern.test(email)){
emailError.innerHTML="Enter valid email (must contain @ and domain)";
valid=false;
}


/* Password Validation */

let passwordPattern=/^[A-Z].*(?=.*[0-9])(?=.*[!@#$%^&*]).{5,}$/;

if(!passwordPattern.test(password)){
passError.innerHTML=
"Password must start with capital, include number, special character, min 5 characters";
valid=false;
}


/* Success */

if(valid){
successMsg.innerHTML="✅ Form Submitted Successfully!";
}

return valid;

}

</script>

</body>
</html>
